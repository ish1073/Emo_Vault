# EmoVault Database Configuration

# MySQL Database Configuration
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/emovault
db.username=root
db.password=
db.pool.size=10

# Application Configuration
app.name=EmoVault
app.version=1.0
app.encoding=UTF-8

# Session Configuration
session.timeout=30
session.cookie.name=EMOVAULT_SESSION

# Feature Flags
feature.twoFactor=false
feature.emailVerification=false
feature.socialLogin=false

# Security
security.passwordMinLength=6
security.passwordRequireSpecialChar=false
security.maxLoginAttempts=5
security.lockoutDuration=300

# UI Configuration
ui.theme=light
ui.language=en
ui.dateFormat=yyyy-MM-dd
